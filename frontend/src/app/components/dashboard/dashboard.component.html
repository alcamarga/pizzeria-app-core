<style>
  .dash-container {
    background-image: url('/assets/images/pizzeria-app-core.jpg');
    background-size: cover; background-position: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .main-panel {
    background: rgba(255, 255, 255, 0.95); /* Panel blanco casi sólido para máxima claridad */
    color: #333;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }
</style>

<div class="dash-container">
  <div class="container main-panel">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold"><span class="text-warning">📦</span> Gestión de Productos</h2>
      <button class="btn btn-dark fw-bold px-4" (click)="router.navigate(['/menu'])">Ver Menú Público</button>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Producto</th>
            <th>Variantes y Precios</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (p of listaPizzas; track p.id) {
            <tr>
              <td class="text-muted fw-bold">#{{ p.id }}</td>
              <td>
                <div class="fw-bold text-dark h5 mb-0">{{ p.nombre }}</div>
                <small class="text-muted">{{ p.descripcion }}</small>
              </td>
              <td>
                @for (v of p.variantes; track v.tamano) {
                  <span class="badge bg-secondary me-1">{{ v.tamano }}: ${{ v.precio | number }}</span>
                }
              </td>
              <td class="text-center">
                <button class="btn btn-sm btn-primary me-2 px-3" (click)="editarPizza(p.id)">Editar</button>
                <button class="btn btn-sm btn-danger px-3" (click)="eliminarPizza(p.id)">Eliminar</button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
