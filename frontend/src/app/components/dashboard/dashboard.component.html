<style>
  .dash-container {
    background-image: url('/assets/images/pizzeria-app-core.jpg');
    background-size: cover;
    background-position: center;
    min-height: 100vh;
    padding: 40px 20px;
    filter: brightness(1.2);
  }
  .light-overlay {
    background: rgba(255, 255, 255, 0.2);
    min-height: 100vh;
    padding: 40px 20px;
  }
  .main-panel {
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    color: white;
    padding: 30px;
  }
  .main-panel h2 {
    color: #ffc107;
  }
  .main-panel .text-warning {
    color: #ffc107;
  }
  .main-panel table {
    color: white;
  }
  .main-panel .text-muted {
    color: rgba(255,255,255,0.5);
  }
</style>

<div class="dash-container">
  <div class="light-overlay">
    <div class="container main-panel">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><span class="text-warning">📦</span> Inventario de Productos</h2>
        <button class="btn btn-dark fw-bold px-4" (click)="volverAlMenu()">Ver Menú Público</button>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th class="text-warning">ID</th>
              <th class="text-warning">Nombre del Producto</th>
              <th class="text-warning">Estado/Stock</th>
            </tr>
          </thead>
          <tbody>
            @for (p of listaPizzas; track p.id) {
              <tr>
                <td class="text-muted fw-bold">#{{ p.id }}</td>
                <td>
                  <div class="fw-bold text-white h5 mb-0">{{ p.nombre }}</div>
                  <small class="text-white-50">{{ p.descripcion }}</small>
                </td>
                <td class="text-center">
                  <span class="badge" [ngClass]="{'bg-success': p.activo, 'bg-danger': !p.activo}">
                    {{ p.activo ? 'Disponible' : 'Agotado' }}
                  </span>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
