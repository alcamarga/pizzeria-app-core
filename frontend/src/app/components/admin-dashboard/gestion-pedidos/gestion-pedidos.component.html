<div class="gestion-container">
  <div class="header">
    <h2>Gestión de Pedidos</h2>
    <p>Control de flujo y estados de venta</p>
  </div>

  <div *ngIf="cargando" class="loading">
    <div class="spinner"></div>
  </div>

  <div *ngIf="!cargando" class="table-wrapper">
    <table class="admin-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Fecha</th>
          <th>Cliente ID</th>
          <th>Total</th>
          <th>Artículos</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of pedidos">
          <td>#{{ p.id }}</td>
          <td>{{ p.fecha_hora }}</td>
          <td>User #{{ p.usuario_id }}</td>
          <td class="price">{{ p.total | currency:'USD':'symbol':'1.0-0' }}</td>
          <td>
            <div class="articulos-cell">
              <span *ngFor="let a of p.articulos">{{ a.cantidad }}x {{ a.nombre }}</span>
            </div>
          </td>
          <td>
            <select 
              [(ngModel)]="p.estado" 
              (change)="cambiarEstado(p.id, p.estado)"
              [class]="'status-select ' + p.estado.toLowerCase()">
              <option *ngFor="let st of estadosDisponibles" [value]="st">{{ st }}</option>
            </select>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Toast Notification -->
  <div class="toast-notification" [class.show]="mostrarToast()">
    {{ mensajeToast() }}
  </div>
</div>
